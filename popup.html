<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wifi Speed Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <svg class="header-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h.01"></path>
          <path d="M8.5 16.5a5 5 0 0 1 7 0"></path>
          <path d="M5 13a10 10 0 0 1 14 0"></path>
          <path d="M1.5 9.5a15 15 0 0 1 21 0"></path>
        </svg>
        <h1>SpeedMonitor</h1>
      </div>
      <button id="btn-options" class="icon-button" title="Configuración">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <!-- Main Gauge Area -->
    <main class="app-main">
      <div class="status-gauge-container">
        <div id="status-ring" class="status-ring pulse-excellent">
          <div class="inner-gauge">
            <span class="status-label">ESTADO</span>
            <span id="status-value" class="status-text text-excellent">Excelente</span>
            <div id="test-loader" class="loader hidden"></div>
          </div>
        </div>
      </div>

      <!-- Real-time metrics grid -->
      <section class="metrics-grid">
        <!-- Download speed -->
        <div class="metric-card bg-glass">
          <div class="card-icon download-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <polyline points="19 12 12 19 5 12"></polyline>
            </svg>
          </div>
          <div class="metric-info">
            <span class="metric-title">Descarga</span>
            <div class="metric-row">
              <span id="speed-val" class="metric-value">--.-</span>
              <span class="metric-unit">Mbps</span>
            </div>
          </div>
        </div>

        <!-- Latency -->
        <div class="metric-card bg-glass">
          <div class="card-icon latency-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
          </div>
          <div class="metric-info">
            <span class="metric-title">Latencia</span>
            <div class="metric-row">
              <span id="latency-val" class="metric-value">--</span>
              <span class="metric-unit">ms</span>
            </div>
          </div>
        </div>
      </section>

      <!-- Connection Outage Info -->
      <section id="outage-section" class="info-banner bg-glass-alert hidden">
        <div class="banner-content">
          <span class="warning-dot"></span>
          <span id="outage-text" class="banner-text">Desconectado. Tiempo caído: 0s</span>
        </div>
      </section>
      
      <!-- Normal recovery info banner -->
      <section id="last-outage-banner" class="info-banner bg-glass hidden">
        <div class="banner-content">
          <span class="info-dot"></span>
          <span id="last-outage-text" class="banner-text">Última caída: Hace -- (duró --)</span>
        </div>
      </section>

      <!-- Stat Summary Grid (Averages & Alerts) -->
      <section class="stats-summary bg-glass">
        <div class="summary-item">
          <span class="summary-label">Prom. Velocidad</span>
          <span id="avg-speed" class="summary-value">-- Mbps</span>
        </div>
        <div class="summary-item divider-left">
          <span class="summary-label">Prom. Latencia</span>
          <span id="avg-latency" class="summary-value">-- ms</span>
        </div>
        <div class="summary-item divider-left">
          <span class="summary-label">Alertas</span>
          <span id="alert-count-val" class="summary-value warning-text">0</span>
        </div>
      </section>

      <!-- History Graph -->
      <section class="history-chart-area bg-glass">
        <div class="chart-header">
          <h3>Historial de Velocidad</h3>
          <span id="last-update" class="chart-subtitle">Actualizado: --</span>
        </div>
        <div class="canvas-container">
          <canvas id="history-chart"></canvas>
        </div>
      </section>
    </main>

    <!-- Footer Controls -->
    <footer class="app-footer">
      <button id="btn-test" class="primary-button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
        </svg>
        <span>Medir Ahora</span>
      </button>
      <button id="btn-export" class="secondary-button" title="Exportar Historial a CSV">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        <span>CSV</span>
      </button>
    </footer>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
