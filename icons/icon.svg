<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Gradients -->
    <linearGradient id="gauge-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="needle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f953c6" />
      <stop offset="100%" stop-color="#b91d73" />
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="128" height="128" rx="28" fill="#0f172a" />
  
  <!-- Outer glowing track ring -->
  <circle cx="64" cy="68" r="42" fill="none" stroke="#1e293b" stroke-width="8" stroke-dasharray="180 360" stroke-linecap="round" transform="rotate(-180 64 68)" />
  
  <!-- Speed indicator level (active track) -->
  <circle cx="64" cy="68" r="42" fill="none" stroke="url(#gauge-grad)" stroke-width="8" stroke-dasharray="130 360" stroke-linecap="round" transform="rotate(-180 64 68)" filter="url(#glow)" />
  
  <!-- Inner ring -->
  <circle cx="64" cy="68" r="30" fill="none" stroke="#334155" stroke-dasharray="2 4" />
  
  <!-- Speed Needle/Pointer -->
  <path d="M64 68 L88 44" stroke="url(#needle-grad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Center Pin -->
  <circle cx="64" cy="68" r="8" fill="#1e293b" stroke="#00f2fe" stroke-width="2" />
  <circle cx="64" cy="68" r="3" fill="#ffffff" />
  
  <!-- Wireless signal waves at the top -->
  <path d="M52 30 A18 18 0 0 1 76 30" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" opacity="0.8" />
  <path d="M57 36 A10 10 0 0 1 71 36" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" opacity="0.9" />
  <circle cx="64" cy="42" r="2" fill="#38bdf8" />
</svg>
